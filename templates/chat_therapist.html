<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chat With Therapist</title>
</head>
<body>
    <div id="chat-sidebar">
        <h3>Your Chat Rooms</h3>
        <ul>
            {% for match in matches %}
                {% set other_user_id = match.therapist_user_id if match.student_user_id == session.user_id else match.student_user_id %}
                <li data-room-id="{{ match.match_id }}">
                    Chat with user {{ other_user_id }} (Matched at {{ match.matched_at }})
                </li>
            {% endfor %}
        </ul>
    </div>
</body>
</html>
